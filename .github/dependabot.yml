# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  - package-ecosystem: "maven" # See documentation for possible values
    directory: "/" # Location of package manifests
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "org.jboss.logmanager:log4j-jboss-logmanager"
      - dependency-name: "org.jboss.pnc:pnc-common"
      - dependency-name: "org.jboss.slf4j:slf4j-jboss-logmanager"
      - dependency-name: "org.wildfly.core:wildfly-logging"
      - dependency-name: "ch.qos.logback:logback-classic"
      - dependency-name: "org.apache.httpcomponents.client5:httpclient5"
      - dependency-name: "org.apache.maven.plugins:maven-assembly-plugin" # don't touch this, it breaks kafka integration

  - package-ecosystem: "github-actions" # Also update Github actions
    directory: "/"
    schedule:
      # Check for updates to GitHub Actions every week
      interval: "weekly"
    cooldown:
      default-days: 7
